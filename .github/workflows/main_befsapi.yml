name: Build BEFS API

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BEFS/BEFS.csproj

      - name: Build
        run: dotnet build BEFS/BEFS.csproj --configuration Release --no-restore
